{% extends 'base.html' %}

{% block title %}{{ video.titre }}{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">{{ video.titre }}</h1>
    
    <div class="aspect-video bg-black rounded-lg overflow-hidden">
        <iframe 
            src="{{ video.url_hebergement }}" 
            class="w-full h-full"
            frameborder="0" 
            allowfullscreen>
        </iframe>
    </div>
    
    <div class="mt-4 text-gray-600">
        <p><strong>Enseignant :</strong> {{ video.enseignant }}</p>
        <p><strong>Durée :</strong> {{ video.duree }}</p>
        <p><strong>Type :</strong> {{ video.get_type_video_display }}</p>
    </div>
</div>
{% endblock %}
