{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-100 py-12">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 px-6 py-4">
            <h2 class="text-2xl font-bold text-white text-center">Connexion</h2>
        </div>
        
        <form method="post" class="p-6">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded">
                Nom d'utilisateur ou mot de passe incorrect.
            </div>
            {% endif %}
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Nom d'utilisateur</label>
                <input type="text" name="username" 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 font-medium mb-2">Mot de passe</label>
                <input type="password" name="password" 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                       required>
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition duration-200">
                Se connecter
            </button>
        </form>
        
        <div class="px-6 pb-6 text-center">
            <p class="text-gray-600">
                Pas encore de compte ? 
                <a href="{% url 'accounts:register' %}" class="text-blue-600 hover:underline">S'inscrire</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
